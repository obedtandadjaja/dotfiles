# -- general ------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"        # true color everywhere
set -s escape-time 10
set -g history-limit 10000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on

# let OSC escape sequences pass through to the terminal (Claude Code notifications)
set -g allow-passthrough on
# let apps distinguish Shift+Enter from Enter
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# -- prefix -------------------------------------------------------------------

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
set -g prefix2 C-a
bind C-a send-prefix -2

# -- windows & panes ----------------------------------------------------------

bind / split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind Tab last-pane
bind > swap-pane -D
bind < swap-pane -U

# Cmd+1-9 (forwarded from the terminal as Alt+digit, see ghostty config) jumps
# straight to pane 1-9 in the current window, no prefix needed.
bind -n M-1 select-pane -t :.1
bind -n M-2 select-pane -t :.2
bind -n M-3 select-pane -t :.3
bind -n M-4 select-pane -t :.4
bind -n M-5 select-pane -t :.5
bind -n M-6 select-pane -t :.6
bind -n M-7 select-pane -t :.7
bind -n M-8 select-pane -t :.8
bind -n M-9 select-pane -t :.9

# , renames the current pane (overrides the default rename-window binding)
bind , command-prompt -I "#{pane_title}" "select-pane -T '%%'"
set -g pane-border-status top
set -g pane-border-format "#{pane_index} #{pane_title}"

# -- copy mode (vi keys, macOS clipboard) ---------------------------------------

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# -- misc -----------------------------------------------------------------------

bind r source-file ~/.tmux.conf \; display "config reloaded"

# -- activity monitoring -------------------------------------------------------

setw -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=#e0af68,bg=#1a1b26,bold"

# -- status line (tokyonight-ish) -----------------------------------------------

set -g status-style "fg=#a9b1d6,bg=#1a1b26"
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#[fg=#a9b1d6]#(pmset -g batt | awk '/InternalBattery/{print $3}' | tr -cd '0-9')%% · %d %b %R "
setw -g window-status-format " #I #W "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I #W #[default]"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "fg=#1a1b26,bg=#e0af68,bold"
